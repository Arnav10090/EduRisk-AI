[pytest]
# Pytest configuration for EduRisk AI

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = backend/tests ml/pipeline

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    integration: Integration tests that may require external services
    unit: Unit tests for pure functions
    slow: Tests that take more than 5 seconds
    docker: Tests that require Docker containers to be running

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (if pytest-cov is installed)
# addopts = --cov=backend --cov=ml --cov-report=html --cov-report=term

# Timeout for tests (requires pytest-timeout)
# timeout = 300
