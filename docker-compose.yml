services:
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    container_name: edurisk-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edurisk-network

  redis:
    image: redis:7-alpine
    container_name: edurisk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edurisk-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: edurisk-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      ML_MODEL_PATH: /app/ml/models
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_production}
      API_KEY: ${API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000}
      DEBUG: ${DEBUG:-False}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./ml/models:/app/ml/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edurisk-network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: edurisk-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - edurisk-network

volumes:
  postgres_data:
  redis_data:

networks:
  edurisk-network:
    driver: bridge
